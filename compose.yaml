services:
  coder:
    image: ${CODER_REPO:-ghcr.io/coder/coder}:${CODER_VERSION:-latest}
    restart: unless-stopped
    network_mode: "service:dind"
    environment:
      CODER_PG_CONNECTION_URL: "postgresql://${POSTGRES_USER:-username}:${POSTGRES_PASSWORD:-password}@database/${POSTGRES_DB:-coder}?sslmode=disable"
      CODER_HTTP_ADDRESS: "0.0.0.0:7080"
      CODER_ACCESS_URL: "${CODER_ACCESS_URL:-http://localhost:7080}"
      DOCKER_HOST: "unix:///var/run/docker-host/docker.sock"
      # Force WebSocket for DERP relay (more stable in nested Docker)
      CODER_DERP_FORCE_WEBSOCKETS: "true"
      # Disable STUN - P2P is impossible in nested Docker, avoid "message too long" errors
      CODER_DERP_SERVER_STUN_ADDRESSES: "disable"
      # Allow Grafana (metrics server) to embed Coder apps in iframes.
      # Set CODER_IFRAME_ALLOW_ORIGINS in .env to the Grafana origin, e.g. http://<tailscale-ip>:3000
      CODER_IFRAME_ALLOW_ORIGINS: "${CODER_IFRAME_ALLOW_ORIGINS}"
      # Allow long-lived admin API tokens (e.g. for CI) up to 5 years.
      CODER_MAX_ADMIN_TOKEN_LIFETIME: "43800h"
    group_add:
     - "1000" # docker group on dind
    volumes:
      - dind_socket:/var/run/docker-host:ro
      - coder_home:/home/coder
    depends_on:
      dind:
        condition: service_started
      database:
        condition: service_healthy
  dind:
    image: "docker:dind"
    restart: unless-stopped
    privileged: true
    ports:
      - "7080:7080"
      - "7681:7681"
    entrypoint: ["sh", "-c"]
    command:
      - "addgroup -g 1000 coder 2>/dev/null || true && rm -f /var/run/docker.pid /var/run/docker/containerd/containerd.pid && exec dockerd -H unix:///var/run/docker.sock --group coder"
    volumes:
      - dind_socket:/var/run
      - dind_data:/var/lib/docker
      - type: bind
        source: /mnt/sda1
        target: /mnt/sda1
        bind:
          propagation: rslave
    dns:
      - 10.240.255.254
      - 8.8.8.8
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 3s
      retries: 5
  database:
    # Minimum supported version is 13.
    # More versions here: https://hub.docker.com/_/postgres
    image: "postgres:17"
    restart: unless-stopped
    # Uncomment the next two lines to allow connections to the database from outside the server.
    #ports:
    #  - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-username} # The PostgreSQL user (useful to connect to the database)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password} # The PostgreSQL password (useful to connect to the database)
      POSTGRES_DB: ${POSTGRES_DB:-coder} # The PostgreSQL default database (automatically created at first launch)
    volumes:
      - coder_data:/var/lib/postgresql/data # Use "docker volume rm coder_coder_data" to reset Coder
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-username} -d ${POSTGRES_DB:-coder}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  coder_data:
  coder_home:
  dind_socket:
  dind_data:
