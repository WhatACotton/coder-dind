kind: pipeline
type: docker
name: deploy-coder-template

trigger:
  branch:
    - main
  event:
    - push
    - custom

steps:
  - name: push-template
    image: alpine:latest
    environment:
      CODER_URL:
        from_secret: coder_url
      CODER_SESSION_TOKEN:
        from_secret: coder_session_token
    commands:
      - apk add --no-cache curl
      - curl -fsSL https://coder.com/install.sh | sh
      - coder login "$CODER_URL" --token "$CODER_SESSION_TOKEN"
      - coder templates push docker --directory ./templates/docker-in-docker --yes
      # Update all running workspaces using this template
      - |
        echo "==> Updating running workspaces..."
        for ws in $(coder list -c workspace --output text 2>/dev/null | tail -n +2); do
          echo "==> Updating workspace: $ws"
          coder restart "$ws" -y 2>&1 || echo "  (skipped: $ws)"
        done
