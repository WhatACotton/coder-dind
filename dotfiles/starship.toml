# Starship Prompt Configuration
# https://starship.rs/config/

# Timeout for commands (ms)
command_timeout = 1000

# Insert blank line between prompts
add_newline = true

# Prompt format
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$nix_shell\
$docker_context\
$nodejs\
$python\
$rust\
$golang\
$java\
$terraform\
$aws\
$gcloud\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[username]
style_user = "bold cyan"
show_always = false

[hostname]
ssh_only = true
style = "bold dimmed white"

[directory]
truncation_length = 5
truncation_symbol = "…/"
style = "bold blue"
read_only = " 🔒"

[git_branch]
symbol = " "
style = "bold purple"
truncation_length = 30

[git_status]
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "=${count}"
untracked = "?${count}"
stashed = "\\$${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
style = "bold yellow"

[nix_shell]
symbol = "❄️ "
style = "bold blue"
format = "via [$symbol$state( \\($name\\))]($style) "

[docker_context]
symbol = "🐳 "
style = "bold blue"
only_with_files = true

[nodejs]
symbol = " "
style = "bold green"

[python]
symbol = "🐍 "
style = "bold yellow"

[rust]
symbol = "🦀 "
style = "bold red"

[golang]
symbol = "🐹 "
style = "bold cyan"

[java]
symbol = "☕ "
style = "bold red"

[terraform]
symbol = "💠 "
style = "bold purple"

[aws]
symbol = "☁️ "
style = "bold yellow"

[gcloud]
symbol = "☁️ "
style = "bold blue"

[cmd_duration]
min_time = 3_000
style = "bold yellow"
format = "took [$duration]($style) "

[time]
disabled = true
